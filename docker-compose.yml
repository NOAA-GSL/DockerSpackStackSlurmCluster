x-node-common: &node-common
  image: ghcr.io/noaa-gsl/dockerspackstackslurmcluster/slurm-spack-stack-node:ubuntu-${UBUNTU_VERSION:-26.04}-spack-stack-${SPACK_STACK_VERSION:-2.1.0}
  shm_size: '4g'
  user: admin
  volumes:
    - home-vol:/home/admin
    - opt-vol:/opt:ro
  depends_on:
    slurmmaster:
      condition: service_started
    slurmfrontend:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "ssh", "-o", "StrictHostKeyChecking=no", "admin@localhost", "hostname"]
    interval: 2s
    timeout: 2s
    retries: 10
    start_period: 5s

services:
  slurmfrontend:
    build:
      context: ./frontend
      args:
        SPACK_BUILD_JOBS: 8
        BASE_IMAGE_TAG: ubuntu-${UBUNTU_VERSION:-26.04}-slurm-${SLURM_VERSION:-25.11.5}
        UBUNTU_VERSION: ${UBUNTU_VERSION:-26.04}
        SPACK_STACK_VERSION: ${SPACK_STACK_VERSION:-2.1.0}
      secrets:
        - github_token
    image: ghcr.io/noaa-gsl/dockerspackstackslurmcluster/slurm-spack-stack-frontend:ubuntu-${UBUNTU_VERSION:-26.04}-spack-stack-${SPACK_STACK_VERSION:-2.1.0}
    container_name: spack-stack-frontend
    shm_size: '4g'
    hostname: slurmfrontend
    user: admin
    volumes:
      - home-vol:/home/admin
      - opt-vol:/opt
    ports:
      - 8888:8888
    healthcheck:
      # /tmp/ssh-ready is created by the base image entrypoint after munged + sshd are up
      # and the admin SSH keypair is written. The long start_period absorbs the multi-GB
      # initial copy of /opt (spack-stack install) into the empty opt-vol on first launch;
      # subsequent restarts reuse the populated volume and finish quickly.
      test: ["CMD", "test", "-f", "/tmp/ssh-ready"]
      interval: 5s
      timeout: 2s
      retries: 250
      start_period: 60s

  slurmmaster:
    build:
      context: ./master
      args:
        BASE_IMAGE_TAG: ubuntu-${UBUNTU_VERSION:-26.04}-slurm-${SLURM_VERSION:-25.11.5}
    image: ghcr.io/noaa-gsl/dockerspackstackslurmcluster/slurm-spack-stack-master:ubuntu-${UBUNTU_VERSION:-26.04}-spack-stack-${SPACK_STACK_VERSION:-2.1.0}
    container_name: spack-stack-master
    shm_size: '4g'
    hostname: slurmmaster
    user: admin
    volumes:
      - home-vol:/home/admin
      - opt-vol:/opt:ro
    environment:
      - SLURM_CPUS_ON_NODE=8
    ports:
      - 6817:6817
      - 6818:6818
      - 6819:6819
    depends_on:
      slurmfrontend:
        condition: service_healthy

  slurmnode1:
    <<: *node-common
    build:
      context: ./node
      args:
        BASE_IMAGE_TAG: ubuntu-${UBUNTU_VERSION:-26.04}-slurm-${SLURM_VERSION:-25.11.5}
    container_name: spack-stack-node1
    hostname: slurmnode1
    environment:
      - SLURM_NODENAME=slurmnode1
      - SLURM_CPUS_ON_NODE=8

  slurmnode2:
    <<: *node-common
    container_name: spack-stack-node2
    hostname: slurmnode2
    environment:
      - SLURM_NODENAME=slurmnode2
      - SLURM_CPUS_ON_NODE=8

  slurmnode3:
    <<: *node-common
    container_name: spack-stack-node3
    hostname: slurmnode3
    environment:
      - SLURM_NODENAME=slurmnode3
      - SLURM_CPUS_ON_NODE=8

  slurmnode4:
    <<: *node-common
    container_name: spack-stack-node4
    hostname: slurmnode4
    environment:
      - SLURM_NODENAME=slurmnode4
      - SLURM_CPUS_ON_NODE=8

  slurmnode5:
    <<: *node-common
    container_name: spack-stack-node5
    hostname: slurmnode5
    environment:
      - SLURM_NODENAME=slurmnode5
      - SLURM_CPUS_ON_NODE=8

volumes:
  home-vol:
  opt-vol:

secrets:
  github_token:
    environment: GITHUB_TOKEN
