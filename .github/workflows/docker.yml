name: Docker Slurm

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

env:
  # Slurm version baked into the base image tag (ubuntu-<UBUNTU>-slurm-<SLURM_VERSION>).
  # Bump only when the base dockerslurmcluster repo publishes new tags with a different slurm.
  # NOT embedded in our own published image tags -- consumers care about spack-stack version.
  SLURM_VERSION: 25.11.5
  # Spack-stack version. Drives the git checkout branch AND appears in our image tag suffix.
  SPACK_STACK_VERSION: 2.1.0
  # The ubuntu version that also gets the `latest` alias on our published images.
  # Matches the dockerslurmcluster registry's `latest`-pointing convention.
  LATEST_UBUNTU: '26.04'
  REGISTRY_FRONTEND_IMAGE: ghcr.io/noaa-gsl/dockerspackstackslurmcluster/slurm-spack-stack-frontend
  REGISTRY_MASTER_IMAGE: ghcr.io/noaa-gsl/dockerspackstackslurmcluster/slurm-spack-stack-master
  REGISTRY_NODE_IMAGE: ghcr.io/noaa-gsl/dockerspackstackslurmcluster/slurm-spack-stack-node

jobs:

  build-test-push-amd64:
    name: amd64 (ubuntu-${{ matrix.ubuntu }})
    runs-on: ubuntu2204-8c-32g-300ssd
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        ubuntu: &ubuntu_versions
          - '24.04'
          - '26.04'
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      -
        name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false
      -
        name: Prune pre-loaded GHA docker images
        run: |
          docker images
          docker image prune -a -f
          docker images
      -
        name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          tags: ${{ env.REGISTRY_FRONTEND_IMAGE }}:ubuntu-${{ matrix.ubuntu }}-spack-stack-${{ env.SPACK_STACK_VERSION }}
          build-args: |
            SPACK_BUILD_JOBS=8
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
            UBUNTU_VERSION=${{ matrix.ubuntu }}
            SPACK_STACK_VERSION=${{ env.SPACK_STACK_VERSION }}
          secrets: |
            "github_token=${{ secrets.GITHUB_TOKEN }}"
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/frontend-cache-ubuntu-${{ matrix.ubuntu }}-amd64:cache
          cache-to: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/frontend-cache-ubuntu-${{ matrix.ubuntu }}-amd64:cache,mode=max
          load: true
      -
        name: Build master image
        uses: docker/build-push-action@v5
        with:
          context: ./master
          file: ./master/Dockerfile
          platforms: linux/amd64
          tags: ${{ env.REGISTRY_MASTER_IMAGE }}:ubuntu-${{ matrix.ubuntu }}-spack-stack-${{ env.SPACK_STACK_VERSION }}
          build-args: |
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/master-cache-ubuntu-${{ matrix.ubuntu }}-amd64:cache
          cache-to: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/master-cache-ubuntu-${{ matrix.ubuntu }}-amd64:cache,mode=max
          load: true
      -
        name: Build node image
        uses: docker/build-push-action@v5
        with:
          context: ./node
          file: ./node/Dockerfile
          platforms: linux/amd64
          tags: ${{ env.REGISTRY_NODE_IMAGE }}:ubuntu-${{ matrix.ubuntu }}-spack-stack-${{ env.SPACK_STACK_VERSION }}
          build-args: |
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/node-cache-ubuntu-${{ matrix.ubuntu }}-amd64:cache
          cache-to: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/node-cache-ubuntu-${{ matrix.ubuntu }}-amd64:cache,mode=max
          load: true
      -
        name: Start containers for testing
        env:
          UBUNTU_VERSION: ${{ matrix.ubuntu }}
          SLURM_VERSION: ${{ env.SLURM_VERSION }}
          SPACK_STACK_VERSION: ${{ env.SPACK_STACK_VERSION }}
        run: docker compose -f docker-compose-test.yml up --pull never -d --wait
      -
        name: Check cluster logs
        run: docker compose -f docker-compose-test.yml logs
      -
        name: Check status of the cluster containers
        run: docker compose -f docker-compose-test.yml ps
      -
        name: Check status of Slurm
        run: docker exec spack-stack-frontend sinfo
      -
        name: Run a Slurm job
        run: docker exec spack-stack-frontend srun hostname
      -
        name: Test ssh access to Slurm compute nodes
        run: |
          docker exec spack-stack-frontend timeout 1s ssh slurmnode1 hostname
          docker exec spack-stack-frontend timeout 1s ssh slurmnode2 hostname
          docker exec spack-stack-frontend timeout 1s ssh slurmnode3 hostname
      -
        name: Load spack-stack envs
        run: |
          docker exec spack-stack-frontend bash -l -c "module use /opt/spack-stack/envs/unified-env/modules/Core ; module load stack-gcc stack-openmpi jedi-mpas-env; module list"
          docker exec spack-stack-frontend bash -l -c "module use /opt/spack-stack/envs/unified-env/modules/Core ; module load stack-gcc stack-openmpi jedi-fv3-env; module list"
      -
        name: Compile and run MPI program
        run: docker exec spack-stack-frontend bash -l -c "cd test; ./test_hello.sh"
      -
        name: Shut down Slurm cluster containers
        if: always()
        env:
          UBUNTU_VERSION: ${{ matrix.ubuntu }}
          SLURM_VERSION: ${{ env.SLURM_VERSION }}
          SPACK_STACK_VERSION: ${{ env.SPACK_STACK_VERSION }}
        run: docker compose -f docker-compose-test.yml down
      -
        name: Push frontend by digest
        id: push-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          build-args: |
            SPACK_BUILD_JOBS=8
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
            UBUNTU_VERSION=${{ matrix.ubuntu }}
            SPACK_STACK_VERSION=${{ env.SPACK_STACK_VERSION }}
          secrets: |
            "github_token=${{ secrets.GITHUB_TOKEN }}"
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/frontend-cache-ubuntu-${{ matrix.ubuntu }}-amd64:cache
          outputs: type=image,name=${{ env.REGISTRY_FRONTEND_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      -
        name: Push master by digest
        id: push-master
        uses: docker/build-push-action@v5
        with:
          context: ./master
          file: ./master/Dockerfile
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/master-cache-ubuntu-${{ matrix.ubuntu }}-amd64:cache
          outputs: type=image,name=${{ env.REGISTRY_MASTER_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      -
        name: Push node by digest
        id: push-node
        uses: docker/build-push-action@v5
        with:
          context: ./node
          file: ./node/Dockerfile
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/node-cache-ubuntu-${{ matrix.ubuntu }}-amd64:cache
          outputs: type=image,name=${{ env.REGISTRY_NODE_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      -
        name: Export digests
        run: |
          mkdir -p /tmp/digests/frontend /tmp/digests/master /tmp/digests/node
          frontend_digest="${{ steps.push-frontend.outputs.digest }}"
          master_digest="${{ steps.push-master.outputs.digest }}"
          node_digest="${{ steps.push-node.outputs.digest }}"
          touch "/tmp/digests/frontend/${frontend_digest#sha256:}"
          touch "/tmp/digests/master/${master_digest#sha256:}"
          touch "/tmp/digests/node/${node_digest#sha256:}"
      -
        name: Upload frontend digest
        uses: actions/upload-artifact@v4
        with:
          name: frontend-ubuntu-${{ matrix.ubuntu }}-digests-linux-amd64
          path: /tmp/digests/frontend/*
          if-no-files-found: error
          retention-days: 1
      -
        name: Upload master digest
        uses: actions/upload-artifact@v4
        with:
          name: master-ubuntu-${{ matrix.ubuntu }}-digests-linux-amd64
          path: /tmp/digests/master/*
          if-no-files-found: error
          retention-days: 1
      -
        name: Upload node digest
        uses: actions/upload-artifact@v4
        with:
          name: node-ubuntu-${{ matrix.ubuntu }}-digests-linux-amd64
          path: /tmp/digests/node/*
          if-no-files-found: error
          retention-days: 1
      -
        name: Debug session
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          limit-access-to-actor: true

  build-test-push-arm64:
    name: arm64 (ubuntu-${{ matrix.ubuntu }})
    runs-on: LinuxARM64-8core-32G-300Gb
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        ubuntu: *ubuntu_versions
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      -
        name: Install Docker
        run: |
           # Uninstall incompatible packages
           for pkg in docker.io containerd runc; do sudo apt-get remove $pkg; done
           # Add Docker's official GPG key:
           sudo apt-get update
           sudo apt-get install ca-certificates curl
           sudo install -m 0755 -d /etc/apt/keyrings
           sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
           sudo chmod a+r /etc/apt/keyrings/docker.asc
           # Add the repository to Apt sources:
           echo \
             "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
             $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
             sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
           sudo apt-get update -y
           # Install docker packages
           sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
           # Allow runner use to run docker without sudo
           sudo usermod -aG docker $USER
           sudo apt-get install acl
           sudo setfacl --modify user:$USER:rw /var/run/docker.sock
      -
        name: Test Docker Installation
        run: docker run hello-world
      -
        name: Checkout repository
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      -
        name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false
      -
        name: Prune pre-loaded GHA docker images
        run: |
          docker images
          docker image prune -a -f
          docker images
      -
        name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          tags: ${{ env.REGISTRY_FRONTEND_IMAGE }}:ubuntu-${{ matrix.ubuntu }}-spack-stack-${{ env.SPACK_STACK_VERSION }}
          build-args: |
            SPACK_BUILD_JOBS=8
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
            UBUNTU_VERSION=${{ matrix.ubuntu }}
            SPACK_STACK_VERSION=${{ env.SPACK_STACK_VERSION }}
          secrets: |
            "github_token=${{ secrets.GITHUB_TOKEN }}"
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/frontend-cache-ubuntu-${{ matrix.ubuntu }}-arm64:cache
          cache-to: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/frontend-cache-ubuntu-${{ matrix.ubuntu }}-arm64:cache,mode=max
          load: true
      -
        name: Build master image
        uses: docker/build-push-action@v5
        with:
          context: ./master
          file: ./master/Dockerfile
          platforms: linux/arm64
          tags: ${{ env.REGISTRY_MASTER_IMAGE }}:ubuntu-${{ matrix.ubuntu }}-spack-stack-${{ env.SPACK_STACK_VERSION }}
          build-args: |
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/master-cache-ubuntu-${{ matrix.ubuntu }}-arm64:cache
          cache-to: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/master-cache-ubuntu-${{ matrix.ubuntu }}-arm64:cache,mode=max
          load: true
      -
        name: Build node image
        uses: docker/build-push-action@v5
        with:
          context: ./node
          file: ./node/Dockerfile
          platforms: linux/arm64
          tags: ${{ env.REGISTRY_NODE_IMAGE }}:ubuntu-${{ matrix.ubuntu }}-spack-stack-${{ env.SPACK_STACK_VERSION }}
          build-args: |
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/node-cache-ubuntu-${{ matrix.ubuntu }}-arm64:cache
          cache-to: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/node-cache-ubuntu-${{ matrix.ubuntu }}-arm64:cache,mode=max
          load: true
      -
        name: Start containers for testing
        env:
          UBUNTU_VERSION: ${{ matrix.ubuntu }}
          SLURM_VERSION: ${{ env.SLURM_VERSION }}
          SPACK_STACK_VERSION: ${{ env.SPACK_STACK_VERSION }}
        run: docker compose -f docker-compose-test.yml up --pull never -d --wait
      -
        name: Check cluster logs
        run: docker compose -f docker-compose-test.yml logs
      -
        name: Check status of the cluster containers
        run: docker compose -f docker-compose-test.yml ps
      -
        name: Check status of Slurm
        run: docker exec spack-stack-frontend sinfo
      -
        name: Run a Slurm job
        run: docker exec spack-stack-frontend srun hostname
      -
        name: Test ssh access to Slurm compute nodes
        run: |
          docker exec spack-stack-frontend timeout 1s ssh slurmnode1 hostname
          docker exec spack-stack-frontend timeout 1s ssh slurmnode2 hostname
          docker exec spack-stack-frontend timeout 1s ssh slurmnode3 hostname
      -
        name: Load spack-stack envs
        run: |
          docker exec spack-stack-frontend bash -l -c "module use /opt/spack-stack/envs/unified-env/modules/Core ; module load stack-gcc stack-openmpi jedi-mpas-env; module list"
          docker exec spack-stack-frontend bash -l -c "module use /opt/spack-stack/envs/unified-env/modules/Core ; module load stack-gcc stack-openmpi jedi-fv3-env; module list"
      -
        name: Compile and run MPI program
        run: docker exec spack-stack-frontend bash -l -c "cd test; ./test_hello.sh"
      -
        name: Shut down Slurm cluster containers
        if: always()
        env:
          UBUNTU_VERSION: ${{ matrix.ubuntu }}
          SLURM_VERSION: ${{ env.SLURM_VERSION }}
          SPACK_STACK_VERSION: ${{ env.SPACK_STACK_VERSION }}
        run: docker compose -f docker-compose-test.yml down
      -
        name: Push frontend by digest
        id: push-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          build-args: |
            SPACK_BUILD_JOBS=8
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
            UBUNTU_VERSION=${{ matrix.ubuntu }}
            SPACK_STACK_VERSION=${{ env.SPACK_STACK_VERSION }}
          secrets: |
            "github_token=${{ secrets.GITHUB_TOKEN }}"
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/frontend-cache-ubuntu-${{ matrix.ubuntu }}-arm64:cache
          outputs: type=image,name=${{ env.REGISTRY_FRONTEND_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      -
        name: Push master by digest
        id: push-master
        uses: docker/build-push-action@v5
        with:
          context: ./master
          file: ./master/Dockerfile
          platforms: linux/arm64
          build-args: |
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/master-cache-ubuntu-${{ matrix.ubuntu }}-arm64:cache
          outputs: type=image,name=${{ env.REGISTRY_MASTER_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      -
        name: Push node by digest
        id: push-node
        uses: docker/build-push-action@v5
        with:
          context: ./node
          file: ./node/Dockerfile
          platforms: linux/arm64
          build-args: |
            BASE_IMAGE_TAG=ubuntu-${{ matrix.ubuntu }}-slurm-${{ env.SLURM_VERSION }}
          cache-from: type=registry,ref=ghcr.io/noaa-gsl/dockerspackstackslurmcluster/node-cache-ubuntu-${{ matrix.ubuntu }}-arm64:cache
          outputs: type=image,name=${{ env.REGISTRY_NODE_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      -
        name: Export digests
        run: |
          mkdir -p /tmp/digests/frontend /tmp/digests/master /tmp/digests/node
          frontend_digest="${{ steps.push-frontend.outputs.digest }}"
          master_digest="${{ steps.push-master.outputs.digest }}"
          node_digest="${{ steps.push-node.outputs.digest }}"
          touch "/tmp/digests/frontend/${frontend_digest#sha256:}"
          touch "/tmp/digests/master/${master_digest#sha256:}"
          touch "/tmp/digests/node/${node_digest#sha256:}"
      -
        name: Upload frontend digest
        uses: actions/upload-artifact@v4
        with:
          name: frontend-ubuntu-${{ matrix.ubuntu }}-digests-linux-arm64
          path: /tmp/digests/frontend/*
          if-no-files-found: error
          retention-days: 1
      -
        name: Upload master digest
        uses: actions/upload-artifact@v4
        with:
          name: master-ubuntu-${{ matrix.ubuntu }}-digests-linux-arm64
          path: /tmp/digests/master/*
          if-no-files-found: error
          retention-days: 1
      -
        name: Upload node digest
        uses: actions/upload-artifact@v4
        with:
          name: node-ubuntu-${{ matrix.ubuntu }}-digests-linux-arm64
          path: /tmp/digests/node/*
          if-no-files-found: error
          retention-days: 1
      -
        name: Debug session
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          limit-access-to-actor: true

  merge-frontend:
    name: Merge frontend (ubuntu-${{ matrix.ubuntu }})
    runs-on: ubuntu-latest
    needs:
      - build-test-push-amd64
      - build-test-push-arm64
    strategy:
      fail-fast: false
      matrix:
        ubuntu: *ubuntu_versions
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v4
      -
        name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: frontend-ubuntu-${{ matrix.ubuntu }}-digests-*
          merge-multiple: true
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_FRONTEND_IMAGE }}
          tags: |
            type=raw,value=ubuntu-${{ matrix.ubuntu }}-spack-stack-${{ env.SPACK_STACK_VERSION }}
            ${{ matrix.ubuntu == env.LATEST_UBUNTU && 'type=raw,value=latest' || '' }}
          flavor: |
            latest=false
      -
        name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false
      -
        name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_FRONTEND_IMAGE }}@sha256:%s ' *)
      -
        name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}

  merge-master:
    name: Merge master (ubuntu-${{ matrix.ubuntu }})
    runs-on: ubuntu-latest
    needs:
      - build-test-push-amd64
      - build-test-push-arm64
    strategy:
      fail-fast: false
      matrix:
        ubuntu: *ubuntu_versions
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v4
      -
        name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: master-ubuntu-${{ matrix.ubuntu }}-digests-*
          merge-multiple: true
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_MASTER_IMAGE }}
          tags: |
            type=raw,value=ubuntu-${{ matrix.ubuntu }}-spack-stack-${{ env.SPACK_STACK_VERSION }}
            ${{ matrix.ubuntu == env.LATEST_UBUNTU && 'type=raw,value=latest' || '' }}
          flavor: |
            latest=false
      -
        name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false
      -
        name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_MASTER_IMAGE }}@sha256:%s ' *)
      -
        name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_MASTER_IMAGE }}:${{ steps.meta.outputs.version }}

  merge-node:
    name: Merge node (ubuntu-${{ matrix.ubuntu }})
    runs-on: ubuntu-latest
    needs:
      - build-test-push-amd64
      - build-test-push-arm64
    strategy:
      fail-fast: false
      matrix:
        ubuntu: *ubuntu_versions
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v4
      -
        name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: node-ubuntu-${{ matrix.ubuntu }}-digests-*
          merge-multiple: true
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_NODE_IMAGE }}
          tags: |
            type=raw,value=ubuntu-${{ matrix.ubuntu }}-spack-stack-${{ env.SPACK_STACK_VERSION }}
            ${{ matrix.ubuntu == env.LATEST_UBUNTU && 'type=raw,value=latest' || '' }}
          flavor: |
            latest=false
      -
        name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false
      -
        name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_NODE_IMAGE }}@sha256:%s ' *)
      -
        name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_NODE_IMAGE }}:${{ steps.meta.outputs.version }}
